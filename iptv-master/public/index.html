<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Web Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gray: {
                900: '#111827',
                800: '#1f2937',
                700: '#374151',
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">
    <!-- Navbar -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center z-10">
        <h1 class="text-xl font-bold tracking-wider text-indigo-400">IPTV Player</h1>
        <div class="flex items-center space-x-4">
            <label for="country-select" class="text-sm text-gray-400">Country:</label>
            <select id="country-select" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5">
                <option value="bd">bd (Bangladesh)</option>
            </select>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="w-80 border-r border-gray-700 bg-gray-800 overflow-y-auto flex flex-col">
            <div class="p-4 border-b border-gray-700 font-semibold sticky top-0 bg-gray-800 z-10">
                <h2>Channels <span id="channel-count" class="text-gray-400 text-xs ml-2"></span></h2>
            </div>
            <ul id="channel-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <li class="p-4 text-center text-gray-400 text-sm">Loading channels...</li>
            </ul>
        </div>

        <!-- Video Player -->
        <div class="flex-1 bg-black flex flex-col relative">
            <div id="player-container" class="flex-1 w-full h-full">
                <video id="video" class="w-full h-full object-contain" controls autoplay></video>
                <div id="welcome-message" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-lg">Select a channel from the list to start watching</p>
                </div>
            </div>
            <!-- Player Info -->
            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-gray-900 via-gray-900/80 to-transparent p-6 pointer-events-none">
                <h3 id="current-channel-name" class="text-2xl font-bold text-white drop-shadow-md"></h3>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const channelList = document.getElementById('channel-list');
        const countrySelect = document.getElementById('country-select');
        const welcomeMessage = document.getElementById('welcome-message');
        const currentChannelName = document.getElementById('current-channel-name');
        const channelCount = document.getElementById('channel-count');
        let hls = null;
        let channels = [];
        let currentUrl = '';

        // Initialize hls.js
        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60,
            });
            hls.attachMedia(video);
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.error('Fatal network error encountered, try to recover');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.error('Fatal media error encountered, try to recover');
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            break;
                    }
                }
            });
        }

        function playChannel(url, name) {
            currentUrl = url;
            welcomeMessage.style.display = 'none';
            currentChannelName.textContent = name;
            
            if (Hls.isSupported()) {
                hls.loadSource(url);
                video.play().catch(e => console.log('Autoplay blocked', e));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => console.log('Autoplay blocked', e));
                });
            }

            // Update UI list
            document.querySelectorAll('#channel-list li').forEach(li => {
                li.classList.remove('bg-indigo-600', 'text-white');
                li.classList.add('text-gray-300', 'hover:bg-gray-700');
            });
            const activeLi = Array.from(document.querySelectorAll('#channel-list li')).find(li => li.dataset.url === url);
            if (activeLi) {
                activeLi.classList.remove('text-gray-300', 'hover:bg-gray-700');
                activeLi.classList.add('bg-indigo-600', 'text-white');
            }
        }

        async function fetchCountries() {
            try {
                const res = await fetch('/api/channels');
                const data = await res.json();
                
                // Clear out select except for BD (we set it manual to default fast)
                countrySelect.innerHTML = '';
                
                const favorite = 'bd'; // Default to bd
                
                // Add the favorite first
                if (data.includes(favorite)) {
                    const option = document.createElement('option');
                    option.value = favorite;
                    option.textContent = favorite.toUpperCase() + ' (Bangladesh)';
                    countrySelect.appendChild(option);
                }
                
                // Add rest
                data.forEach(c => {
                    if (c !== favorite) {
                        const option = document.createElement('option');
                        option.value = c;
                        option.textContent = c.toUpperCase();
                        countrySelect.appendChild(option);
                    }
                });

                // Load initial country
                if (countrySelect.value) {
                    loadChannels(countrySelect.value);
                }

            } catch (err) {
                console.error('Error fetching countries:', err);
            }
        }

        async function loadChannels(country) {
            channelList.innerHTML = '<li class="p-4 text-center text-gray-400 text-sm">Loading...</li>';
            try {
                const res = await fetch(`/api/channels/${country}`);
                channels = await res.json();
                
                channelList.innerHTML = '';
                channelCount.textContent = `(${channels.length})`;

                if (channels.length === 0) {
                    channelList.innerHTML = '<li class="p-4 text-center text-gray-400 text-sm">No channels found</li>';
                    return;
                }

                channels.forEach((channel, index) => {
                    const li = document.createElement('li');
                    li.className = 'px-4 py-3 rounded-lg cursor-pointer text-gray-300 hover:bg-gray-700 transition-colors text-sm truncate';
                    li.textContent = channel.name || `Channel ${index + 1}`;
                    li.dataset.url = channel.url;
                    
                    li.onclick = () => playChannel(channel.url, channel.name);
                    channelList.appendChild(li);
                });

            } catch (err) {
                console.error('Error loading channels:', err);
                channelList.innerHTML = '<li class="p-4 text-center text-red-400 text-sm">Error loading channels</li>';
            }
        }

        countrySelect.addEventListener('change', (e) => {
            loadChannels(e.target.value);
        });

        fetchCountries();
    </script>
</body>
</html>
