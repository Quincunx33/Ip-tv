name: IPTV Link Checker

on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় চলবে
  workflow_dispatch: # ম্যানুয়ালি চালানোর সুবিধা

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run link checker
        run: python check_links.py

      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add link_report.md
          git commit -m "Update IPTV link check report [skip ci]" || echo "No changes to commit"
          git push
